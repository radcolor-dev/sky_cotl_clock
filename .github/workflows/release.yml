name: Release

on:
  workflow_dispatch:
    inputs:
      notifyDiscordOnly:
        description: "Send Discord notification for latest GitHub Release without building"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  release:
    types: [published]

jobs:
  release-windows:
    name: Build Windows MSI
    if: github.event_name != 'release' && inputs.notifyDiscordOnly != true
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-rs -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: v__VERSION__
          releaseName: "Isekai v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch].[ext]"

  notify-discord:
    name: Notify Discord
    if: (github.event_name == 'release' && github.event.action == 'published') || (github.event_name == 'workflow_dispatch' && inputs.notifyDiscordOnly == true)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Get latest release for manual test
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/releases/latest" > latest-release.json
          {
            echo "RELEASE_NAME=$(jq -r '.name // .tag_name' latest-release.json)"
            echo "RELEASE_TAG=$(jq -r '.tag_name' latest-release.json)"
            echo "RELEASE_URL=$(jq -r '.html_url' latest-release.json)"
            echo "RELEASE_PRERELEASE=$(jq -r '.prerelease' latest-release.json)"
            echo "RELEASE_BODY<<EOF"
            jq -r '.body // ""' latest-release.json
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send release notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          EVENT_RELEASE_NAME: ${{ github.event.release.name }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_RELEASE_URL: ${{ github.event.release.html_url }}
          EVENT_RELEASE_BODY: ${{ github.event.release.body }}
          EVENT_RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Missing DISCORD_RELEASE_WEBHOOK_URL repository secret."
            exit 1
          fi

          export RELEASE_NAME="${RELEASE_NAME:-$EVENT_RELEASE_NAME}"
          export RELEASE_TAG="${RELEASE_TAG:-$EVENT_RELEASE_TAG}"
          export RELEASE_URL="${RELEASE_URL:-$EVENT_RELEASE_URL}"
          export RELEASE_PRERELEASE="${RELEASE_PRERELEASE:-$EVENT_RELEASE_PRERELEASE}"
          export RELEASE_BODY="${RELEASE_BODY:-$EVENT_RELEASE_BODY}"

          node <<'NODE'
          const fs = require("fs");

          const body = process.env.RELEASE_BODY?.trim();
          const description = body && body.length > 0
            ? body.slice(0, 3900)
            : "A new Isekai app update is available.";

          const payload = {
            username: "Isekai Releases",
            content: `New Isekai app update is here: ${process.env.RELEASE_URL}`,
            allowed_mentions: {
              parse: []
            },
            embeds: [
              {
                title: `${process.env.RELEASE_NAME || process.env.RELEASE_TAG} is here`,
                url: process.env.RELEASE_URL,
                description,
                color: process.env.RELEASE_PRERELEASE === "true" ? 16763904 : 5814783,
                fields: [
                  {
                    name: "Version",
                    value: process.env.RELEASE_TAG,
                    inline: true
                  }
                ]
              }
            ]
          };

          fs.writeFileSync("discord-payload.json", JSON.stringify(payload));
          NODE

          curl --fail \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
