name: Release

on:
  workflow_dispatch:
    inputs:
      buildOnly:
        description: "Build Windows, macOS, and Linux installers without creating or uploading release assets"
        required: false
        type: boolean
        default: false
      notifyDiscordOnly:
        description: "Send Discord notification for latest GitHub Release without building"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  release:
    types: [published]

jobs:
  release:
    name: Build ${{ matrix.name }}
    if: github.event_name != 'release' && inputs.notifyDiscordOnly != true
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSI
            os: windows-latest
            tauriArgs: --bundles msi
          - name: macOS DMG
            os: macos-latest
            tauriArgs: --target aarch64-apple-darwin --bundles dmg --no-sign
          - name: Linux AppImage and DEB
            os: ubuntu-latest
            tauriArgs: --bundles appimage,deb

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-rs -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri bundle only
        if: github.event_name == 'workflow_dispatch' && inputs.buildOnly == true
        run: >
          bun run tauri build
          ${{ matrix.tauriArgs }}
          --config '{"bundle":{"createUpdaterArtifacts":false}}'
          --ci
          --no-sign

      - name: Build and publish Tauri release
        if: github.event_name != 'workflow_dispatch' || inputs.buildOnly != true
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          args: ${{ matrix.tauriArgs }}
          tagName: v__VERSION__
          releaseName: "Isekai v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch].[ext]"

  notify-discord:
    name: Notify Discord
    needs: release
    if: |
      always() && (
        ((github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.buildOnly != true && inputs.notifyDiscordOnly != true)) && needs.release.result == 'success') ||
        (github.event_name == 'release' && github.event.action == 'published') ||
        (github.event_name == 'workflow_dispatch' && inputs.notifyDiscordOnly == true)
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Get release details
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" > release.json
          else
            gh api "repos/$GITHUB_REPOSITORY/releases/latest" > release.json
          fi

          {
            echo "RELEASE_NAME=$(jq -r '.name // .tag_name' release.json)"
            echo "RELEASE_TAG=$(jq -r '.tag_name' release.json)"
            echo "RELEASE_URL=$(jq -r '.html_url' release.json)"
            echo "RELEASE_PRERELEASE=$(jq -r '.prerelease' release.json)"
            echo "RELEASE_BODY<<EOF"
            jq -r '.body // ""' release.json
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send release notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          EVENT_RELEASE_NAME: ${{ github.event.release.name }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_RELEASE_URL: ${{ github.event.release.html_url }}
          EVENT_RELEASE_BODY: ${{ github.event.release.body }}
          EVENT_RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Missing DISCORD_RELEASE_WEBHOOK_URL repository secret."
            exit 1
          fi

          export RELEASE_NAME="${RELEASE_NAME:-$EVENT_RELEASE_NAME}"
          export RELEASE_TAG="${RELEASE_TAG:-$EVENT_RELEASE_TAG}"
          export RELEASE_URL="${RELEASE_URL:-$EVENT_RELEASE_URL}"
          export RELEASE_PRERELEASE="${RELEASE_PRERELEASE:-$EVENT_RELEASE_PRERELEASE}"
          export RELEASE_BODY="${RELEASE_BODY:-$EVENT_RELEASE_BODY}"

          node <<'NODE'
          const fs = require("fs");

          const version = process.env.RELEASE_TAG || process.env.RELEASE_NAME || "latest";
          const body = process.env.RELEASE_BODY?.trim() || "See the GitHub release page for details.";
          const maxBodyLength = 1500;
          const changelog = body.length > maxBodyLength
            ? `${body.slice(0, maxBodyLength).trim()}\n\n...`
            : body;

          const payload = {
            username: "Isekai Releases",
            content: [
              changelog,
              `[View GitHub release](${process.env.RELEASE_URL})`,
              "",
              "\u200b"
            ].join("\n"),
            flags: 4,
            allowed_mentions: {
              parse: []
            },
            components: [
              {
                type: 1,
                components: [
                  {
                    type: 2,
                    style: 5,
                    label: `Download Isekai ${version}`,
                    url: "https://radcolor.github.io/sky_cotl_clock/"
                  }
                ]
              }
            ]
          };

          fs.writeFileSync("discord-payload.json", JSON.stringify(payload));
          NODE

          curl --fail \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "${DISCORD_WEBHOOK_URL}?with_components=true"
